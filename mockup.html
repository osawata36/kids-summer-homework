<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿題管理アプリ - UI モックアップ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: #4CAF50;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .add-task {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .add-task input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .add-task input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .category-select {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }

        .category-btn.selected {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .add-btn {
            width: 100%;
            padding: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .tasks-section {
            padding: 20px;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
        }

        .filter-btn.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }

        .task {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #eee;
            border-radius: 10px;
            background: white;
        }

        .task.completed {
            background: #f0f8f0;
            border-color: #4CAF50;
        }

        .task.completed .task-text {
            text-decoration: line-through;
            color: #666;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #ddd;
            border-radius: 50%;
            margin-right: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task.completed .task-checkbox {
            background: #4CAF50;
            border-color: #4CAF50;
            color: white;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .task-category {
            font-size: 12px;
            color: #666;
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .stats {
            background: #f8f9fa;
            padding: 15px 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 宿題管理</h1>
            <p>今日も頑張ろう！</p>
        </div>

        <div class="add-task">
            <input type="text" placeholder="新しい宿題を追加..." value="">
            <div class="category-select">
                <button class="category-btn selected">算数</button>
                <button class="category-btn">国語</button>
                <button class="category-btn">理科</button>
                <button class="category-btn">その他</button>
            </div>
            <button class="add-btn">追加する</button>
        </div>

        <div class="tasks-section">
            <div class="category-filter">
                <button class="filter-btn active">すべて</button>
                <button class="filter-btn">算数</button>
                <button class="filter-btn">国語</button>
                <button class="filter-btn">理科</button>
                <button class="filter-btn">その他</button>
            </div>

            <div class="task completed">
                <div class="task-checkbox">✓</div>
                <div class="task-content">
                    <div class="task-text">計算プリント10ページ</div>
                    <div class="task-category">算数</div>
                </div>
            </div>

            <div class="task">
                <div class="task-checkbox"></div>
                <div class="task-content">
                    <div class="task-text">漢字練習帳2ページ</div>
                    <div class="task-category">国語</div>
                </div>
            </div>

            <div class="task">
                <div class="task-checkbox"></div>
                <div class="task-content">
                    <div class="task-text">理科の実験レポート</div>
                    <div class="task-category">理科</div>
                </div>
            </div>

            <div class="task completed">
                <div class="task-checkbox">✓</div>
                <div class="task-content">
                    <div class="task-text">読書感想文の下書き</div>
                    <div class="task-category">国語</div>
                </div>
            </div>

            <div class="task">
                <div class="task-checkbox"></div>
                <div class="task-content">
                    <div class="task-text">夏休みの絵日記</div>
                    <div class="task-category">その他</div>
                </div>
            </div>

            <div class="task">
                <div class="task-checkbox"></div>
                <div class="task-content">
                    <div class="task-text">九九の暗記テスト準備</div>
                    <div class="task-category">算数</div>
                </div>
            </div>
        </div>

        <div class="stats">
            完了: 2個 | 残り: 4個 | 合計: 6個
        </div>
    </div>
</body>
</html>
